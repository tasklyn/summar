<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>سُمّار · Summar</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tajawal,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;
 background:radial-gradient(120% 80% at 50% -10%,#5A3C28,transparent 60%),linear-gradient(165deg,#2A1D14,#1a110b);color:#F4EBDC}
.card{width:min(440px,94vw);text-align:center}
.logo{width:96px;height:96px;border-radius:50%;background:#FBF5EA;display:grid;place-items:center;margin:0 auto 22px;
 font-size:42px;box-shadow:0 16px 40px -12px rgba(0,0,0,.6)}
h1{font-family:'Playfair Display',serif;font-size:44px;color:#C2A06B;letter-spacing:1px}
.sub{font-size:14px;color:#D9C39A;margin:6px 0 30px;letter-spacing:3px}
a.btn{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;color:#2A1D14;
 background:linear-gradient(135deg,#C2A06B,#A9854D);font-weight:800;font-size:17px;padding:17px;border-radius:18px;margin-bottom:12px;
 box-shadow:0 12px 28px -10px rgba(194,160,107,.5);transition:transform .15s}
a.btn:active{transform:scale(.97)}
a.btn.ghost{background:rgba(251,245,234,.08);color:#F4EBDC;border:1px solid rgba(255,255,255,.15);box-shadow:none}
a.btn.dim{background:rgba(251,245,234,.06);color:#D9C39A;font-weight:700;font-size:15px}
.note{font-size:12px;color:#8A745F;margin-top:18px;line-height:1.8}
.off{display:none;color:#E0A89A;font-size:13px;margin-top:14px}
</style></head><body>
<div class="card">
  <div class="logo">☕</div>
  <h1>سُمّار</h1>
  <div class="sub">SUMMAR · COFFEE</div>
  <a class="btn" id="lApp" href="#">📱 تطبيق العميل</a>
  <a class="btn ghost" id="lDash" href="#">🧾 لوحة الكاشير</a>
  <a class="btn dim" id="lSite" href="#">🌐 الموقع التعريفي</a>
  <div class="off" id="off">⚠️ الخادم غير متصل حالياً — تأكد أن الجهاز يعمل.</div>
  <div class="note">رابط ثابت دائم · يحوّلك تلقائياً للخادم الحالي</div>
</div>
<script>
fetch('url.txt?_='+Date.now()).then(r=>r.text()).then(function(u){
  u=(u||'').trim().replace(/\/+$/,'');
  if(!u){ document.getElementById('off').style.display='block'; return; }
  document.getElementById('lApp').href = u+'/';
  document.getElementById('lDash').href = u+'/dashboard';
  document.getElementById('lSite').href = u+'/site';
  // quick health check
  fetch(u+'/api/info?_='+Date.now()).catch(function(){ document.getElementById('off').style.display='block'; });
}).catch(function(){ document.getElementById('off').style.display='block'; });
</script>
</body></html>
